<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Number Validation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/libphonenumber-js/1.9.47/libphonenumber-js.min.js"></script>
</head>
<body>
    <h1>Phone Number Validation</h1>
    <form id="phone-form">
        <label for="phone-numbers">Enter phone numbers (one per line):</label><br>
        <textarea id="phone-numbers" name="phone-numbers" rows="10" cols="30" placeholder="1151610644\n+5491151610644" required></textarea><br>
        <button type="submit">Validate</button>
    </form>
    <div id="results"></div>

    <script>
        document.getElementById('phone-form').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const phoneNumbersInput = document.getElementById('phone-numbers').value;
            const phoneNumbers = phoneNumbersInput.split('\n');
            const resultsDiv = document.getElementById('results');
            
            resultsDiv.innerHTML = ''; // Clear previous results

            phoneNumbers.forEach(number => {
                number = number.trim(); // Remove any extra whitespace
                if (number) {
                    const phoneNumber = libphonenumber.parsePhoneNumber(number, 'AR'); // Cambia 'US' si es necesario

                    let result = `<p><strong>${number}:</strong> `;
                    if (phoneNumber.isValid()) {
                        result += `Number is valid. Formatted number: ${phoneNumber.formatInternational()}.`;
                    } else {
                        result += 'Number is invalid.';
                    }
                    result += '</p>';

                    resultsDiv.innerHTML += result;
                }
            });
        });
    </script>
</body>
</html>
