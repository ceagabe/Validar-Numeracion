<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Number Validation</title>
    
    <!-- script src="https://cdnjs.cloudflare.com/ajax/libs/google-libphonenumber/3.2.38/libphonenumber.min.js"></script> -->
    <!--<script src="https://cdnjs.cloudflare.com/ajax/libs/google-libphonenumber/3.2.40/libphonenumber.min.js"></script> -->
    
    <!-- <script src="https://cdn.jsdelivr.net/npm/google-libphonenumber/libphonenumber.min.js"></script>-->
    
    <script src="https://cdn.jsdelivr.net/npm/google-libphonenumber"></script>

    
    
</head>
<body>
    <h1 onclick="alert">Phone Number Validation</h1>
    <form id="phone-form">
        <label for="phone-numbers">Enter phone numbers (one per line):</label><br>
        <textarea id="phone-numbers" name="phone-numbers" rows="10" cols="30" placeholder="1151610644
                                                                                           0111551610644
                                                                                           005401151610644" required></textarea><br>
        <button type="submit">Validate</button>
    </form>
    <div id="results"></div>

    <script>
        document.getElementById('phone-form').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const phoneNumbersInput = document.getElementById('phone-numbers').value;
            const phoneNumbers = phoneNumbersInput.split('\n');
            const resultsDiv = document.getElementById('results');
            const phoneUtil = libphonenumber.PhoneNumberUtil.getInstance();

            resultsDiv.innerHTML = ''; // Clear previous results

            phoneNumbers.forEach(number => {
                number = number.trim(); // Remove any extra whitespace
                if (number) {
                    try {
                        const phoneNumber = phoneUtil.parse(number, 'AR'); // Cambia 'AR' si es necesario
                        let result = `<p><strong>${number}:</strong> `;
                        if (phoneUtil.isValidNumber(phoneNumber)) {
                            const formattedNumber = phoneUtil.format(phoneNumber, libphonenumber.PhoneNumberFormat.INTERNATIONAL);
                            result += `Number is valid. Formatted number: ${formattedNumber}.`;
                        } else {
                            result += 'Number is invalid.';
                        }
                        result += '</p>';
                        resultsDiv.innerHTML += result;
                    } catch (e) {
                        resultsDiv.innerHTML += `<p><strong>${number}:</strong> Error parsing number.</p>`;
                    }
                }
            });
        });
    </script>

      
    <script>
        alert("Bienvenidos, copiar la lista de numeracion a validar en el recuadro")
    </script>
</body>
</html>
